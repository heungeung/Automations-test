<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>한국 주식 포트폴리오 리서치</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">KR Stock Research · PWA</p>
        <h1>한국 주식 포트폴리오 리서치</h1>
      </div>
      <button class="icon-button" id="installButton" type="button" hidden title="앱 설치">
        설치
      </button>
    </header>

    <main class="app-shell">
      <section class="search-panel" aria-label="한국 종목 조회">
        <form id="lookupForm" class="lookup-form">
          <label>
            종목코드
            <input id="symbolInput" type="text" inputmode="numeric" maxlength="6" placeholder="005930" required />
          </label>
          <label>
            종목명
            <input id="nameInput" type="text" placeholder="삼성전자" />
          </label>
          <button type="submit">조회</button>
        </form>
        <p id="statusText" class="status-text">한국 상장 종목코드 6자리를 입력하세요.</p>
      </section>

      <section class="quote-grid" aria-label="종목 기본 정보">
        <article class="quote-card main-quote">
          <span>현재가</span>
          <strong id="currentPrice">-</strong>
          <small id="quoteName">종목을 조회하면 표시됩니다.</small>
        </article>
        <article class="quote-card">
          <span>전일 대비</span>
          <strong id="priceChange">-</strong>
        </article>
        <article class="quote-card">
          <span>거래량</span>
          <strong id="volume">-</strong>
        </article>
        <article class="quote-card">
          <span>최근 거래일</span>
          <strong id="tradeDate">-</strong>
        </article>
      </section>

      <section class="chart-section" aria-label="차트">
        <div class="section-heading">
          <h2>가격 차트</h2>
          <div class="segmented-control" role="group" aria-label="차트 기간">
            <button class="active" type="button" data-range="1d">일봉</button>
            <button type="button" data-range="1wk">주봉</button>
            <button type="button" data-range="1mo">월봉</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="priceChart" width="1080" height="420"></canvas>
        </div>
      </section>

      <section class="details-grid">
        <article class="info-panel">
          <div class="section-heading">
            <h2>기본 정보</h2>
          </div>
          <dl class="info-list">
            <div>
              <dt>Yahoo 심볼</dt>
              <dd id="yahooSymbol">-</dd>
            </div>
            <div>
              <dt>거래소</dt>
              <dd id="exchangeName">-</dd>
            </div>
            <div>
              <dt>통화</dt>
              <dd id="currency">-</dd>
            </div>
            <div>
              <dt>52주 범위</dt>
              <dd id="yearRange">-</dd>
            </div>
          </dl>
        </article>

        <article class="info-panel">
          <div class="section-heading">
            <h2>10% 이상 보유 ETF</h2>
            <span id="etfCount">0개</span>
          </div>
          <div id="etfList" class="etf-list">
            <p class="empty-state">종목을 조회하면 ETF 편입 정보를 확인합니다.</p>
          </div>
        </article>
      </section>

      <section class="portfolio-section">
        <div class="section-heading">
          <h2>최근 조회 종목</h2>
          <span id="recentCount">0개</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>종목코드</th>
                <th>종목명</th>
                <th>현재가</th>
                <th>조회일시</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recentRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
