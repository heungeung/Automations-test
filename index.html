<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>주식 포트폴리오</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">KR · US Portfolio</p>
        <h1>주식 포트폴리오</h1>
      </div>
      <button class="icon-button" id="installButton" type="button" hidden title="앱 설치">
        설치
      </button>
    </header>

    <main class="app-shell">
      <section class="summary-grid" aria-label="포트폴리오 요약">
        <article class="summary-card">
          <span>한국 평가금액</span>
          <strong id="krValue">₩0</strong>
        </article>
        <article class="summary-card">
          <span>한국 손익</span>
          <strong id="krProfit">₩0</strong>
        </article>
        <article class="summary-card">
          <span>미국 평가금액</span>
          <strong id="usValue">$0.00</strong>
        </article>
        <article class="summary-card">
          <span>미국 손익</span>
          <strong id="usProfit">$0.00</strong>
        </article>
      </section>

      <section class="tool-panel" aria-label="종목 추가">
        <form id="stockForm" class="stock-form">
          <label>
            시장
            <select id="market">
              <option value="KR">한국</option>
              <option value="US">미국</option>
            </select>
          </label>
          <label>
            종목명
            <input id="name" type="text" placeholder="삼성전자" required />
          </label>
          <label>
            티커
            <input id="ticker" type="text" placeholder="005930.KS / AAPL" required />
          </label>
          <label>
            보유수량
            <input id="quantity" type="number" min="0" step="0.0001" required />
          </label>
          <label>
            평균단가
            <input id="avgPrice" type="number" min="0" step="0.01" required />
          </label>
          <label>
            현재가
            <input id="currentPrice" type="number" min="0" step="0.01" required />
          </label>
          <button type="submit">추가</button>
        </form>
      </section>

      <section class="portfolio-section">
        <div class="section-heading">
          <h2>한국 상장 주식</h2>
          <span id="krCount">0개</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>종목</th>
                <th>티커</th>
                <th>수량</th>
                <th>평균단가</th>
                <th>현재가</th>
                <th>평가금액</th>
                <th>손익</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="krRows"></tbody>
          </table>
        </div>
      </section>

      <section class="portfolio-section">
        <div class="section-heading">
          <h2>미국 상장 주식</h2>
          <span id="usCount">0개</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>종목</th>
                <th>티커</th>
                <th>수량</th>
                <th>평균단가</th>
                <th>현재가</th>
                <th>평가금액</th>
                <th>손익</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="usRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
